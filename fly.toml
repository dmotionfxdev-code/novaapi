# Fly.io app configuration — deploys the existing docker/api/Dockerfile
# unmodified (aside from the PORT/EXPOSE fix in
# docs/DEPLOYMENT_AUDIT_RENDER_RAILWAY_FLYIO.md §7). No worker/beat/relay
# processes are declared here — traced in that audit (§1) to carry zero
# real Celery tasks; not required for the API to function.
#
# `app` must be globally unique across all of Fly.io — rename it before
# your first `fly launch`/`fly deploy` if "georisk-api" is already taken.
#
# Secrets (DATABASE_URL, JWT_SECRET_KEY, REDIS_URL if you attach one,
# GEE_*, SMTP_*, ...) are NOT set here — Fly's own docs are explicit that
# secrets take precedence over [env] and must never live in this file.
# Set them with, e.g.:
#   fly secrets set DATABASE_URL="postgresql+asyncpg://..." \
#                   JWT_SECRET_KEY="$(python3 -c 'import secrets; print(secrets.token_urlsafe(64))')" \
#                   CORS_ALLOWED_ORIGINS="https://your-frontend.example"
# Redis is genuinely optional for this app (see the deployment audit's
# Redis row) — omit REDIS_URL/REDIS_RATELIMIT_URL entirely if you don't
# want to provision one; /health/ready will correctly report "degraded"
# (not "unhealthy") and the app continues operating normally.

app = "georisk-api"
# Closest Fly region to this platform's actual deployment target
# (novaapi.novarex.co.tz, Tanzania — see CPANEL_DEPLOYMENT_GUIDE.md) among
# Fly's available regions is Johannesburg, South Africa. Change this if
# your real user base is elsewhere.
primary_region = "jnb"

[build]
  dockerfile = "docker/api/Dockerfile"

[http_service]
  internal_port = 8000 # matches the EXPOSE/entrypoint default in
    # docker/api/Dockerfile — no PORT env var needs to be set for Fly
    # (unlike Railway), since Fly's proxy connects to this fixed port.
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0 # 0 = allow scale-to-zero when idle (cheapest;
    # set to 1 to avoid cold starts once this is more than a
    # verification deployment).

  [[http_service.checks]]
    grace_period = "15s"
    interval = "10s"
    method = "GET"
    timeout = "3s"
    path = "/health/ready" # Safe even during a brief Redis outage —
      # Sprint D made this endpoint report 200 "degraded" (not 503) when
      # only Redis is unreachable, so it won't falsely fail this check
      # and cause an unwanted Machine restart.

[env]
  ENVIRONMENT = "production"
