[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os

# Intentionally blank — set at runtime from georisk.settings.get_settings()
# in migrations/env.py, so there is exactly one place a database URL is
# configured, never a second copy to drift out of sync (Implementation
# Bootstrap §5).
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
