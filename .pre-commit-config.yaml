repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        additional_dependencies: [pydantic==2.10.4, sqlalchemy==2.0.36]
        args: [--config-file=pyproject.toml]

  # Sprint 0 Review finding #18 / Remediation #18 — a real, working
  # guardrail, not deferred: .env files and multiple credential sets already
  # exist throughout this repository's own scaffolding, so a committed
  # secret is a realistic risk from the first contributor onward.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
